<html lang="zh-CN" data-theme="dark">
<head>

            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="app-main">
      <div class="container">
        <div id="loading" class="loading">
          <div class="loading-spinner"></div>
          <p>正在加载课表数据...</p>
        </div>

        <div id="error" class="error-message" style="display: none;">
          <p id="error-text"></p>
        </div>

        <div id="timetable-content" class="timetable-content" style="display: none;">
          <div class="timetable-header-bar">
            <div class="week-navigator">
              <button id="prev-week" class="btn btn-icon" aria-label="上一周">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
              </button>
              <span class="week-display">第 <span id="current-week">1</span> 周</span>
              <button id="next-week" class="btn btn-icon" aria-label="下一周">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
              <span id="current-week-badge" class="week-badge" style="display: none;">当前周</span>
            </div>
            <div class="week-info">
              共 <span id="max-week">20</span> 周
            </div>
          </div>

          <div id="live-status-container"></div>

          <div id="visual-editor-container"></div>

          <p class="timetable-hint">提示：周次切换后将展示该周实际有课的安排，多周课程会在对应周自动出现。</p>

          <div id="timetable-grid-container"></div>
          <div id="timetable-daylist-container"></div>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <div class="container">
        <p>© 2026 克喵的课程表 | Made with ❤️</p>
      </div>
    </footer>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
